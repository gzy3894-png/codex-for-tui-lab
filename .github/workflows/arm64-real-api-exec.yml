name: Codex for TUI ARM64 Real API Exec

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Source repository owner/name
        required: false
        default: gzy3894-png/codex-cli-zh-binary-skill
      source_ref:
        description: Source branch, tag, or SHA
        required: false
        default: android-arm64-musl-installer

jobs:
  arm64-real-api-exec:
    name: Real ARM64 Codex exec through relay
    runs-on: ubuntu-24.04-arm
    env:
      KRILL_API_BASE: ${{ secrets.KRILL_API_BASE }}
      KRILL_API_KEY: ${{ secrets.KRILL_API_KEY }}
      KRILL_TEST_MODEL: ${{ secrets.KRILL_TEST_MODEL }}

    steps:
      - name: Checkout lab
        uses: actions/checkout@v4

      - name: Checkout source under test
        shell: bash
        run: |
          source_repo="${{ github.event.inputs.source_repo }}"
          source_ref="${{ github.event.inputs.source_ref }}"
          source_repo="${source_repo:-gzy3894-png/codex-cli-zh-binary-skill}"
          source_ref="${source_ref:-android-arm64-musl-installer}"
          sh scripts/checkout-source.sh "$source_repo" "$source_ref" "$GITHUB_WORKSPACE/_source"

      - name: Verify real ARM64 exec against relay
        shell: bash
        env:
          CODEX_TUI_SOURCE_REPO: ${{ github.event.inputs.source_repo || 'gzy3894-png/codex-cli-zh-binary-skill' }}
        run: sh tests/lab-arm64-real-api-exec.sh "$GITHUB_WORKSPACE/_source"

      - name: Upload real ARM64 exec logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-real-api-exec-logs
          path: |
            /tmp/codex-tui-lab-*/logs/**
          if-no-files-found: ignore
