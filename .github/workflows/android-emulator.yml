name: Codex for TUI Android Emulator

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Source repository owner/name
        required: false
        default: gzy3894-png/codex-cli-zh-binary-skill
      source_ref:
        description: Source branch, tag, or SHA
        required: false
        default: android-arm64-musl-installer

jobs:
  android-emulator:
    name: Build and launch debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CODEX_TUI_LAB_ANDROID_LOG_ROOT: ${{ github.workspace }}/android-emulator-logs

    steps:
      - name: Checkout lab
        uses: actions/checkout@v4

      - name: Checkout source under test
        shell: bash
        run: |
          source_repo="${{ github.event.inputs.source_repo }}"
          source_ref="${{ github.event.inputs.source_ref }}"
          source_repo="${source_repo:-gzy3894-png/codex-cli-zh-binary-skill}"
          source_ref="${source_ref:-android-arm64-musl-installer}"
          sh scripts/checkout-source.sh "$source_repo" "$source_ref" "$GITHUB_WORKSPACE/_source"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            _source/android-app/**/*.gradle*
            _source/android-app/**/gradle-wrapper.properties
            _source/android-app/gradle/libs.versions.toml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Android log directory
        shell: bash
        run: |
          mkdir -p "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs"
          {
            date -u
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_attempt=$GITHUB_RUN_ATTEMPT"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
            uname -a
            groups || true
            ls -l /dev/kvm || true
            df -h "$GITHUB_WORKSPACE" || true
            free -m || true
          } > "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs/runner-preflight.log"

      - name: Enable KVM
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' |
              sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            ls -l /dev/kvm | tee -a "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs/runner-preflight.log"
          else
            echo "WARN: /dev/kvm is not present" |
              tee -a "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs/runner-preflight.log"
          fi

      - name: Build debug APK
        working-directory: _source/android-app
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.13846066"
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Launch APK in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          pre-emulator-launch-script: |
            mkdir -p "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs"
            {
              date -u
              echo "ANDROID_AVD_HOME=${ANDROID_AVD_HOME:-}"
              ls -l /dev/kvm || true
              find "${ANDROID_AVD_HOME:-$HOME/.android/avd}" -maxdepth 3 -type f -name config.ini -print -exec sed -n '1,220p' {} \; || true
            } > "$CODEX_TUI_LAB_ANDROID_LOG_ROOT/logs/pre-emulator-launch.log"
          script: sh tests/lab-android-emulator-smoke.sh "$GITHUB_WORKSPACE/_source"

      - name: Upload Android logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-logs
          path: |
            android-emulator-logs/logs/**
          if-no-files-found: error
